name: Android Debug Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-latest-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Prepare latest APK filename
        run: cp app/build/outputs/apk/debug/app-debug.apk astra-latest-app-debug.apk

      - name: Publish latest APK release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: astra-latest
          name: Astra Latest Debug APK
          files: astra-latest-app-debug.apk
          make_latest: true
