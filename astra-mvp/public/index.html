<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astra MVP</title>
    <style>
      body { font-family: Inter, system-ui, sans-serif; margin: 2rem; max-width: 720px; }
      button { margin-right: .5rem; margin-bottom: .5rem; padding: .6rem 1rem; }
      pre { background: #111; color: #ddd; padding: 1rem; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h1>Astra MVP</h1>
    <p>Use buttons to test wake flows.</p>
    <button onclick="post('/api/wakeup/fire')">Fire now</button>
    <button onclick="post('/api/wakeup/ack')">I'm awake</button>
    <button onclick="post('/api/wakeup/snooze', { minutes: 10 })">Snooze 10m</button>
    <pre id="out">ready</pre>
    <script>
      async function post(url, body = {}) {
        const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        document.getElementById('out').textContent = JSON.stringify(await r.json(), null, 2);
      }
    </script>
  </body>
</html>
