name: Build Astra Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'astra-wakeup-android/**'
      - '.github/workflows/astra-android-build.yml'
  pull_request:
    paths:
      - 'astra-wakeup-android/**'
      - '.github/workflows/astra-android-build.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: astra-wakeup-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon --stacktrace :app:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-wakeup-debug-apk
          path: astra-wakeup-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: astra-wakeup-debug-build-logs
          path: |
            astra-wakeup-android/app/build/reports
            astra-wakeup-android/app/build/outputs/logs
          if-no-files-found: warn
          retention-days: 14


  publish-rolling-release:
    if: github.ref == 'refs/heads/main'
    needs: build-debug-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: astra-wakeup-debug-apk
          path: dist

      - name: Publish rolling pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: astra-latest
          prerelease: true
          name: Astra Wake-Up (latest)
          files: dist/app-debug.apk
